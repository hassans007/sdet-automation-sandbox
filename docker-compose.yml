services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: sdet
      POSTGRES_PASSWORD: sdet
      POSTGRES_DB: sdet
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdet -d sdet"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm ci && node src/server.js"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://sdet:sdet@db:5432/sdet
      JWT_SECRET: supersecret
      ADMIN_RESET_TOKEN: reset-token
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10